<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Harrowing</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/app.css">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <script src="js/harrow.js"></script>
    </head>
    <body>
        <div class="embers" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
        </div>
        <main class="grimoire">
            <h1 class="grimoire-title">Harrowing</h1>
            <p class="grimoire-subtitle">A divination of fate &amp; fortune</p>

            <section class="harrow-controls">
                <label class="harrow-field">
                    <span class="harrow-field-label">Type</span>
                    <select class="pull harrow-select" name="Pull" id="Pull">
                        <option value="single">Single</option>
                        <option value="full">Full</option>
                    </select>
                </label>
                <label class="harrow-field">
                    <span class="harrow-field-label">Category</span>
                    <select class="category harrow-select" name="Category" id="Category">
                        <option value="all">All</option>
                        <option value="str">Str</option>
                        <option value="dex">Dex</option>
                        <option value="con">Con</option>
                        <option value="int">Int</option>
                        <option value="wis">Wis</option>
                        <option value="cha">Cha</option>
                    </select>
                </label>
                <button class="specialbutton harrow-pull-btn" type="button">
                    <span class="harrow-pull-btn-label">Pull</span>
                </button>
            </section>

            <section class="focusCard harrow-focus" hidden>
                <p class="harrow-focus-label">Focus Card</p>
                <img class="focusCardImage harrow-focus-img" alt="Focus Harrow Card">
            </section>

            <section class="revealButtons harrow-reveal-row" hidden>
                <button class="revealpast harrow-reveal-btn" type="button">Reveal Past</button>
                <button class="revealpresent harrow-reveal-btn" type="button">Reveal Present</button>
                <button class="revealfuture harrow-reveal-btn" type="button">Reveal Future</button>
            </section>

            <section class="pendingContent harrow-stage"></section>
        </main>
    </body>
</html>
